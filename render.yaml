services:
  - type: web
    name: softwareasan-portal
    runtime: static
    repo: https://github.com/okanyucel2/softwareasan-portal
    branch: main
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
